<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#08080C"/>
  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#5B8DEF" stroke-width="0.5">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M300 0 V630 M500 0 V630 M700 0 V630 M900 0 V630 M1100 0 V630"/>
  </g>
  <!-- Strike accent bar -->
  <rect x="80" y="80" width="60" height="4" fill="#C5FF3D"/>
  <!-- Eyebrow -->
  <text x="80" y="120" font-family="JetBrains Mono, monospace" font-size="18" fill="#F5F2EA" opacity="0.6" letter-spacing="3">CHEETAH AGI</text>
  <!-- Headline -->
  <text x="80" y="280" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="86" font-weight="600" fill="#F5F2EA">Speed at the velocity</text>
  <text x="80" y="380" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="86" font-weight="600" fill="#F5F2EA">of <tspan font-family="Fraunces, serif" font-style="italic" fill="#C5FF3D">intelligence</tspan>.</text>
  <!-- Subhead -->
  <text x="80" y="460" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="26" fill="#F5F2EA" opacity="0.7">AI consulting · Automation · Funnels · Agents</text>
  <!-- URL pill -->
  <rect x="80" y="510" width="220" height="44" rx="22" fill="none" stroke="#1F1F2C"/>
  <text x="190" y="540" font-family="JetBrains Mono, monospace" font-size="16" fill="#F5F2EA" text-anchor="middle">cheetahagi.com</text>
  <!-- Logo mark -->
  <g transform="translate(1020 220)">
    <circle r="80" fill="none" stroke="#1F1F2C" stroke-width="1"/>
    <path d="M-40 30 L-10 -10 L10 10 L40 -30" stroke="#C5FF3D" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="32" cy="-26" r="4" fill="#C5FF3D"/>
    <circle cx="0" cy="0" r="3" fill="#5B8DEF"/>
  </g>
