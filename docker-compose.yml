services:
  postgres:
    image: postgres:15
    container_name: influencify_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aditya
      POSTGRES_DB: influencify
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432"
    networks:
      - influencify_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: influencify_redis
    restart: unless-stopped
    ports:
      - "6379"
    networks:
      - influencify_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ─── Billionairevox services ──────────────────────────────────────────────

  backend:
    build: ./api
    container_name: influencify_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./api/.env
    ports:
      - "5000:5000"
    networks:
      - influencify_network

  frontend:
    build: ./web
    container_name: influencify_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./web/.env
    ports:
      - "3000:3000"
    networks:
      - influencify_network

  # ─── CheetahAGI services ──────────────────────────────────────────────────

  cheetahagi-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cheetahagi_api
    restart: unless-stopped
    env_file:
      - ./api/.env
    volumes:
      - cheetahagi_data:/app/data
    ports:
      - "4000:4000"
    networks:
      - influencify_network

  cheetahagi-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.cheetahagi.com
    container_name: cheetahagi_web
    restart: unless-stopped
    depends_on:
      - cheetahagi-api
    env_file:
      - ./web/.env
    ports:
      - "3001:3001"
    networks:
      - influencify_network

  cheetahagi-admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.cheetahagi.com
        NEXT_PUBLIC_WEB_URL: https://cheetahagi.com
    container_name: cheetahagi_admin
    restart: unless-stopped
    depends_on:
      - cheetahagi-api
    env_file:
      - ./admin/.env
    ports:
      - "3002:3002"
    networks:
      - influencify_network

  # ─── WhatsApp services ────────────────────────────────────────────────────

  whatsapp-api:
    build: ./whatsapp-api
    container_name: whatsapp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./whatsapp-api/.env
    ports:
      - "6000:6000"
    networks:
      - influencify_network

  whatsapp-web:
    build: ./whatsapp-web
    container_name: whatsapp-web
    restart: unless-stopped
    depends_on:
      - whatsapp-api
    env_file:
      - ./whatsapp-web/.env
    ports:
      - "3003:3000"
    networks:
      - influencify_network

  # ─── Callio services ──────────────────────────────────────────────────────

  callio-api:
    build: ./callio-api
    container_name: callio-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./callio-api/.env
    ports:
      - "7000:7000"
    networks:
      - influencify_network

  callio-web:
    build: ./callio-web
    container_name: callio-web
    restart: unless-stopped
    depends_on:
      - callio-api
    env_file:
      - ./callio-web/.env
    ports:
      - "3004:3000"
    networks:
      - influencify_network

  # ─── Calling Agent ────────────────────────────────────────────────────────

  calling_agent:
    build: ./calling_agent
    container_name: calling_agent
    restart: unless-stopped
    env_file:
      - ./calling_agent/.env
    ports:
      - "8000:8000"
    networks:
      - influencify_network

  # ─── PgAdmin ──────────────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4
    container_name: influencify_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: mradityaji2@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Qwerty@123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - influencify_network

  # ─── Komodo (deployment manager) ─────────────────────────────────────────

  komodo_mongo:
    image: mongo:7
    container_name: komodo_mongo
    restart: unless-stopped
    volumes:
      - komodo_mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - influencify_network

  komodo:
    image: ghcr.io/mbecker20/komodo:latest
    container_name: komodo
    restart: unless-stopped
    depends_on:
      - komodo_mongo
    ports:
      - "9120:9120"
    environment:
      KOMODO_DATABASE_ADDRESS: komodo_mongo:27017
      KOMODO_LOCAL_AUTH: true
      KOMODO_DATABASE_USERNAME: admin
      KOMODO_DATABASE_PASSWORD: password
    volumes:
      - repo-cache:/repo-cache
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - influencify_network

  # ─── Caddy (reverse proxy) ────────────────────────────────────────────────

  caddy:
    image: caddy:2
    container_name: influencify_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - cheetahagi-web
      - cheetahagi-api
      - cheetahagi-admin
      - pgadmin
      - calling_agent
      - whatsapp-api
      - whatsapp-web
      - callio-api
      - callio-web
      - komodo
    networks:
      - influencify_network

networks:
  influencify_network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  komodo_mongo_data:
  repo-cache:
  cheetahagi_data:
