<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A84F"/>
      <stop offset="100%" stop-color="#F5D27A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#D4A84F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A84F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Gold hairline top -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Eyebrow -->
  <text x="80" y="135" fill="#D4A84F" font-family="monospace" font-size="13" letter-spacing="4">
    EST. 2026 · LUCKNOW · INDIA
  </text>

  <!-- Logo + brand -->
  <g transform="translate(80, 175)">
    <circle cx="22" cy="22" r="22" fill="none" stroke="#C7CCD4" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="11" fill="url(#gold)"/>
    <text x="65" y="33" fill="#FFFFFF" font-family="sans-serif" font-size="32" font-weight="400" letter-spacing="3">
      BORN <tspan fill="#D4A84F">G</tspan>OAT
    </text>
  </g>

  <!-- Headline -->
  <text x="80" y="335" fill="#FFFFFF" font-family="sans-serif" font-size="92" font-weight="800" letter-spacing="-1">
    MARKETING FOR THE
  </text>
  <text x="80" y="430" fill="url(#gold)" font-family="sans-serif" font-size="92" font-weight="800" letter-spacing="-1">
    GREATEST
  </text>
  <text x="80" y="525" fill="#FFFFFF" font-family="sans-serif" font-size="92" font-weight="800" letter-spacing="-1">
    OF ALL TIME.
  </text>

  <!-- Bottom strip -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#222428" stroke-width="1"/>
  <text x="80" y="600" fill="#C7CCD4" font-family="monospace" font-size="14" letter-spacing="3">
    ELITE SPORTS MARKETING HOUSE  ·  borngoat.com
  </text>
</svg>
